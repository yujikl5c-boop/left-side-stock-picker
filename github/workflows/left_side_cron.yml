name: Left Side Stock Picker

on:
  schedule:
    - cron: '50 6 * * *'
    - cron: '10 7 * * *'
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 生成股票池文件
        run: |
          python -c "
import pandas as pd
stocks = [
    ('000001', '平安银行'),
    ('600036', '招商银行'),
    ('000858', '五粮液'),
    ('002415', '海康威视')
]
df = pd.DataFrame(stocks, columns=['code', 'name'])
df.to_excel('stock_list.xlsx', index=False)
print('股票池文件已生成，共', len(df), '只股票')
"
      
      - name: 运行选股程序
        run: python main.py candidates
      
      - name: 提交结果到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add left_daily_candidates.json left_dashboard.html left_history.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "自动更新选股结果 $(date '+%Y-%m-%d %H:%M')"
          git push
