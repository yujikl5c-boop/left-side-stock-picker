name: Left Side Stock Picker

on:
  schedule:
    - cron: '50 6 * * *'
    - cron: '10 7 * * *'
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Generate stock list
        run: |
          python -c "
import pandas as pd
stocks = [
    ('000001', '平安银行'),
    ('600036', '招商银行'),
    ('000858', '五粮液'),

]
df = pd.DataFrame(stocks, columns=['code', 'name'])
df.to_excel('stock_list.xlsx', index=False)
print('Stock list generated with', len(df), 'stocks')
"
      
      - name: Run candidate selection
        run: python main.py candidates
      
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add left_daily_candidates.json left_dashboard.html left_history.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Auto update $(date '+%Y-%m-%d %H:%M')"
          git push
