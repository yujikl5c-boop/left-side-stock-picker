name: Left Side Stock Picker

on:
  schedule:
    - cron: '50 6 * * *'
    - cron: '10 7 * * *'
  workflow_dispatch:

permissions:
  contents: write    # 添加这一行

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install
        run: pip install -r requirements.txt
      - name: Generate stock list
        run: python generate_stock_list.py
      - name: Run
        run: python main.py candidates
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add left_daily_candidates.json left_dashboard.html left_history.json || true
          git commit -m "auto update" || true
          git push
