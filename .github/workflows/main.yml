name: Left Side Stock Picker

on:
  schedule:
    - cron: '25 6 * * *'   # 北京时间 14:25
    - cron: '10 7 * * *'   # 北京时间 15:10
  workflow_dispatch:
    inputs:
      run_mode:
        description: '运行模式 (candidates / history / auto)'
        required: false
        default: 'auto'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载代码
        uses: actions/checkout@v4

      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安装依赖
        run: pip install -r requirements.txt

      - name: 4. 运行主程序（支持外界传入模式）
        run: |
          MODE="${{ github.event.inputs.run_mode }}"
          if [ -z "$MODE" ]; then
            MODE="auto"
          fi
          echo "🚀 接收到指令，运行模式: $MODE"
          python -u main.py $MODE

      - name: 5. 提交结果到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git status
          git commit -m "Auto update $(date '+%Y-%m-%d %H:%M')" || echo "No changes"
          git push

      - name: 6. 准备部署网页
        uses: actions/configure-pages@v5

      - name: 7. 打包网页文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 8. 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
