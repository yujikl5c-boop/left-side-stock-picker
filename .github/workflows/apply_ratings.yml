name: Apply AI Ratings to Dashboard

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ratings_updated]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebuild dashboard with ratings
        run: python build_dashboard_with_ratings.py

      # 准备发布目录：复制生成的网页 + 创建 CNAME 文件
      - name: Prepare publish directory
        run: |
          mkdir -p publish
          cp left_dashboard.html publish/
          echo 'www.stockpool.ltd' > publish/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./publish

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
