name: Apply AI Ratings to Dashboard

on:
  workflow_dispatch:          # 允许手动触发 / API 触发
  repository_dispatch:        # 允许外部 webhook 触发
    types: [ratings_updated]

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Rebuild dashboard with ratings
        run: python build_dashboard_with_ratings.py
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
